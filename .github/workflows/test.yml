name: Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install bats-core
        run: |
          git clone --depth 1 https://github.com/bats-core/bats-core.git /tmp/bats-core
          /tmp/bats-core/install.sh "$HOME/.local"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run unit tests
        run: bats tests/unit/ --print-output-on-failure

  integration:
    name: Integration tests (PG ${{ matrix.pg_version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pg_version: [13, 14, 15, 16, 17, 18]

    steps:
      - uses: actions/checkout@v6

      - name: Run integration tests
        run: bash tests/integration/run.sh ${{ matrix.pg_version }}
